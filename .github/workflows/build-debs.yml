name: "Build Companion App .deb Packages"

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-debs.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-debs:
    name: Build companion app Debian packages
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: beam
            repo: UberMetroid/beam
            port: 4401
          - name: grid
            repo: UberMetroid/grid
            port: 4405
          - name: pad
            repo: UberMetroid/pad
            port: 4402
          - name: todo
            repo: UberMetroid/todo
            port: 4403
          - name: trace
            repo: UberMetroid/trace
            port: 4404

    steps:
      - name: Checkout UberMetroid/packages
        uses: actions/checkout@v4
        with:
          path: packages
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Checkout ${{ matrix.app.name }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.app.repo }}
          path: ${{ matrix.app.name }}
          submodules: recursive

      - name: Build backend binary
        working-directory: ${{ matrix.app.name }}
        run: cargo build --release --bin backend

      - name: Build .deb package
        working-directory: ${{ matrix.app.name }}/backend
        run: cargo deb --no-build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-deb
          path: ${{ matrix.app.name }}/backend/target/debian/*.deb
          if-no-files-found: error

      - name: Move .deb to APT pool (on main)
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p packages/apt/pool/main
          cp ${{ matrix.app.name }}/backend/target/debian/*.deb packages/apt/pool/main/
          ls -la packages/apt/pool/main/${{ matrix.app.name }}_*.deb

      - name: Commit .deb to repo (on main)
        if: github.ref == 'refs/heads/main'
        run: |
          cd packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/pool/main/${{ matrix.app.name }}_*.deb
          git commit -m "ci(packages): publish ${{ matrix.app.name }} .deb update" || echo "No changes"
          git push

  # Update apt index after all jobs complete
  update-index:
    name: Update APT index
    runs-on: ubuntu-22.04
    needs: build-debs
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout UberMetroid/packages
        uses: actions/checkout@v4
        with:
          path: packages
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rebuild APT index
        working-directory: packages/apt
        run: |
          if [ -f update.rs ]; then
            rustc update.rs -o update_bin
            ./update_bin
          else
            echo "update.rs not found; skipping"
          fi

      - name: Commit index updates
        if: github.ref == 'refs/heads/main'
        run: |
          cd packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/
          git commit -m "ci(packages): regenerate APT index" || echo "No changes"
          git push